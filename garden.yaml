# Use "cargo install garden-tools" to install garden https://gitlab.com/garden-rs/garden
#
# usage:
#   garden build
#   garden test
#   garden check
#   garden fmt
#   garden fix

commands:
  bench: cargo bench "$@"
  build: cargo build --all-targets ${workspace} ${release} "$@"
  check>:
    - check/clippy
    - check/fmt
    - check/msrv
    - check/no-std
    - build
    - test
    - doc
  check/clippy: cargo clippy --all-targets ${workspace} ${release} -- -D warnings
  check/fmt: cargo fmt --check
  check/msrv: |
    if type cargo-msrv >/dev/null 2>&1
    then
        cargo msrv --path bench verify
        cargo msrv --path bench/tools/bench_compare verify
        cargo msrv --path bench/tools/gen_large_yaml verify
        cargo msrv --path fuzz verify
        cargo msrv --path parser verify
        cargo msrv --path parser/tools/walk verify
        cargo msrv --path saphyr verify
    fi
  check/no-std: cargo check -p saphyr --no-default-features --target wasm32-unknown-unknown
  doc: RUSTDOCFLAGS="-D warnings" cargo doc ${workspace} --all-features --document-private-items
  fix: cargo clippy --all-targets ${workspace} --fix "$@" -- -D warnings
  fmt: cargo fmt
  fuzz: CARGO_PROFILE_RELEASE_LTO=false cargo +nightly fuzz run parse
  publish: |
    cargo publish --package saphyr-parser "$@"
    cargo publish --package saphyr "$@"
    cargo publish --package saphyr-bench "$@"
  test: |
    cargo test ${release}
    cargo test ${release} --doc
  watch: cargo watch --shell "garden check"

variables:
  workspace: ""
  # Debug build: garden build -D release=''
  release: "--release"

trees:
  saphyr-workspace:
    description: A set of crates dedicated to parsing YAML.
    path: ${GARDEN_CONFIG_DIR}
    url: "git@github.com:saphyr-rs/saphyr.git"
    variables:
      workspace: "--workspace"
    remotes:
      mkniewallner: https://github.com/mkniewallner/saphyr
      yaml-test-suite: https://github.com/yaml/yaml-test-suite
  saphyr:
    description: |
      The high-level saphyr crate provides quick-and-easy YAML importing,
      exporting and object manipulation.
  parser:
    description: Fully-compliant YAML 1.2 parser
  bench:
    description: Benchmarking utilities
  bench/tools/gen_large_yaml:
    description: Generate large YAML files
  bench/tools/bench_compare:
    description: Compare benchmarks
  fuzz:
    description: Fuzz testing tools
