name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - master

jobs:
  check:
    name: Lints and checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - run: rustup toolchain install 1.85.0 --profile minimal --component rustfmt --component clippy --no-self-update
      - run: rustup default 1.85.0
      - run: rustup target add wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy checks
        run: cargo clippy --all-targets -- -D warnings
      - name: Run format checks
        run: cargo fmt --check
      - name: Check `no_std` compatibility
        run: cargo check -p saphyr --no-default-features --target wasm32v1-none

  test:
    name: Test using Rust ${{ matrix.rust }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable, 1.85.0]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - run: rustup toolchain install ${{ matrix.rust }} --profile minimal --no-self-update
      - uses: Swatinem/rust-cache@v2
      - name: Run build
        run: cargo build
      - name: Run tests
        run: cargo test -v
